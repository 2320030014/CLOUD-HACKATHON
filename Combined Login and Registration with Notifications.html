<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notification Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: white;
        }
        .container {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            width: 300px;
        }
        h2 {
            text-align: center;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        .toggle-link {
            text-align: center;
            margin-top: 10px;
        }
        .notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 300px;
        }
        .notification {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .notification.show {
            opacity: 1;
        }
        .success { background: rgba(76, 175, 80, 0.8); }
        .error { background: rgba(244, 67, 54, 0.8); }
    </style>
</head>
<body>
    <div class="notification-container" id="notification-container"></div>
    <div class="container" id="form-container">
        <h2 id="form-title">Login</h2>
        <form id="auth-form">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <div class="toggle-link">
            <span>Don't have an account? <a href="#" id="toggle-form">Register</a></span>
        </div>
    </div>

    <script>
        const toggleLink = document.getElementById('toggle-form');
        const authForm = document.getElementById('auth-form');
        const formTitle = document.getElementById('form-title');
        const notificationContainer = document.getElementById('notification-container');

        function showNotification(message, type) {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerText = message;
            notificationContainer.appendChild(notification);

            setTimeout(() => {
                notification.classList.add('show');
            }, 100);

            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => {
                    notificationContainer.removeChild(notification);
                }, 500);
            }, 3000);
        }

        toggleLink.addEventListener('click', (e) => {
            e.preventDefault();
            if (formTitle.innerText === 'Login') {
                formTitle.innerText = 'Register';
                authForm.innerHTML = `
                    <input type="text" id="username" placeholder="Username" required>
                    <input type="password" id="password" placeholder="Password" required>
                    <input type="password" id="confirm-password" placeholder="Confirm Password" required>
                    <button type="submit">Register</button>
                `;
            } else {
                formTitle.innerText = 'Login';
                authForm.innerHTML = `
                    <input type="text" id="username" placeholder="Username" required>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="submit">Login</button>
                `;
            }
        });

        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            // Check if it's a registration or login
            if (formTitle.innerText === 'Login') {
                // Simulate login process
                showNotification(`Welcome back, ${username}!`, 'success');
            } else {
                const confirmPassword = document.getElementById('confirm-password') ? document.getElementById('confirm-password').value : '';
                if (password && confirmPassword && password === confirmPassword) {
                    showNotification(`Registration successful for ${username}!`, 'success');
                } else if (password !== confirmPassword) {
                    showNotification('Passwords do not match.', 'error');
                } else {
                    showNotification('Please fill in all fields.', 'error');
                }
            }
        });
    </script>
</body>
</html>
